<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard & Quiz Generator</title>
    <style>
        :root {
            --primary: #4F46E5;
            --bg: #F3F4F6;
            --text: #1F2937;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        h1 {
            text-align: center;
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #D1D5DB;
            border-radius: 6px;
            font-family: inherit;
            box-sizing: border-box;
            font-size: 1.1rem;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 6px;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
            margin-bottom: 0.5rem;
        }

        button:hover {
            background-color: #4338CA;
        }

        button:disabled {
            background-color: #9CA3AF;
            cursor: not-allowed;
        }

        /* Generic shared UI */
        .controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 10px;
            margin-bottom: 0.5rem;
        }

        .controls button {
            flex: 1;
            margin-bottom: 0;
        }

        #status {
            text-align: center;
            margin-top: 1rem;
            font-weight: 600;
            color: #4B5563;
        }
        
        .counter {
            text-align: center;
            margin-bottom: 1rem;
            font-weight: 600;
            color: #6B7280;
            font-size: 1.1rem;
        }

        /* Review & Edit Area */
        #review-area {
            display: none;
            flex-direction: column;
        }

        #review-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1.5rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .review-item {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .review-item input.rev-word {
            flex: 1;
        }

        .review-item input.rev-def {
            flex: 2;
        }

        .review-item button.del-btn {
            flex: 0;
            width: auto;
            padding: 0.75rem 1rem;
            background-color: #EF4444;
            margin-bottom: 0;
        }

        .review-item button.del-btn:hover {
            background-color: #DC2626;
        }

        /* Flashcard Area */
        #flashcard-area {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .scene {
            width: 100%;
            height: 250px;
            perspective: 600px;
            margin-bottom: 1.5rem;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card.is-flipped {
            transform: rotateX(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            box-sizing: border-box;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            font-size: 1.25rem;
        }

        .card-front {
            background-color: #FFFFFF;
            border: 2px solid var(--primary);
            font-weight: bold;
            font-size: 2rem;
        }

        .card-back {
            background-color: var(--primary);
            color: white;
            transform: rotateX(180deg);
            overflow-y: auto;
            font-size: 1.4rem;
        }

        /* Quiz Area */
        #quiz-area {
            display: none;
            flex-direction: column;
        }

        #quiz-word {
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .quiz-btn {
            background-color: #E5E7EB;
            color: var(--text);
            padding: 1.2rem;
            font-size: 1.15rem;
            font-weight: 500;
            text-align: left;
            border: 2px solid transparent;
            transition: all 0.2s;
            margin-bottom: 0;
        }

        .quiz-btn:hover:not(:disabled) {
            background-color: #D1D5DB;
        }

        .quiz-btn.correct {
            background-color: #10B981 !important;
            color: white;
            border-color: #059669;
        }

        .quiz-btn.wrong {
            background-color: #EF4444 !important;
            color: white;
            border-color: #B91C1C;
        }

        #quiz-results {
            display: none;
            text-align: center;
        }

        #quiz-results h2 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="container" id="setup-area">
        <h1>Study App Generator</h1>
        
        <div class="input-group">
            <label for="word-list">Words to learn (comma separated or new lines)</label>
            <textarea id="word-list" placeholder="e.g. Obfuscate, Ephemeral, Sycophant"></textarea>
        </div>

        <button id="generate-btn">Fetch Definitions</button>
        <div id="status"></div>
    </div>

    <div class="container" id="review-area">
        <h1>Review & Edit</h1>
        <div class="counter">Fix missing definitions or add new words</div>
        
        <div id="review-list">
            </div>

        <button id="add-row-btn" style="background-color: #6B7280;">Add Blank Row</button>
        <button id="start-study-btn" style="background-color: #10B981; margin-top: 1rem;">Save & Start Studying</button>
        <button class="reset-btn" style="background-color: #EF4444; margin-top: 10px;">Start Over</button>
    </div>

    <div class="container" id="flashcard-area">
        <h1>Flashcards</h1>
        <div class="counter" id="card-counter">Card 1 of X</div>
        
        <div class="scene">
            <div class="card" id="flashcard">
                <div class="card-face card-front" id="card-front">Word</div>
                <div class="card-face card-back" id="card-back">Definition</div>
            </div>
        </div>

        <div class="controls">
            <button id="prev-btn">Previous</button>
            <button id="next-btn">Next</button>
        </div>
        <button id="go-to-quiz-btn" style="background-color: #10B981; margin-top: 10px;">Test Me (Quiz Mode)</button>
        <button id="back-to-review-btn" style="background-color: #6B7280; margin-top: 10px;">Edit Cards</button>
        <button class="reset-btn" style="background-color: #EF4444; margin-top: 10px;">Start Over</button>
    </div>

    <div class="container" id="quiz-area">
        <h1>Quiz Time</h1>
        <div id="quiz-gameplay">
            <div class="counter" id="quiz-counter">Question 1 of X</div>
            <div id="quiz-word">Word</div>
            
            <div class="quiz-options" id="quiz-options">
                </div>
        </div>

        <div id="quiz-results">
            <h2>Score: <span id="final-score">0</span></h2>
            <p>Great job!</p>
            <br>
            <button id="restart-quiz-btn" style="margin-bottom: 10px;">Play Quiz Again</button>
        </div>

        <button id="back-to-flashcards-btn" style="background-color: #4F46E5; margin-top: 10px;">Back to Flashcards</button>
        <button class="reset-btn" style="background-color: #EF4444; margin-top: 10px;">Start Over</button>
    </div>

    <script>
        // Global State
        let flashcards = [];
        let currentIndex = 0;
        
        // Quiz State
        let quizQuestions = [];
        let currentQuizIndex = 0;
        let score = 0;

        // View Containers
        const setupArea = document.getElementById('setup-area');
        const reviewArea = document.getElementById('review-area');
        const flashcardArea = document.getElementById('flashcard-area');
        const quizArea = document.getElementById('quiz-area');
        
        const statusDiv = document.getElementById('status');
        const generateBtn = document.getElementById('generate-btn');

        // Setup & Fetch Logic
        generateBtn.addEventListener('click', async () => {
            const rawWords = document.getElementById('word-list').value.trim();

            if (!rawWords) return alert('Please enter some words.');

            const words = [...new Set(rawWords.split(/,|\n/).map(w => w.trim()).filter(w => w.length > 0))];
            if (words.length === 0) return alert('No valid words found.');

            generateBtn.disabled = true;
            statusDiv.textContent = 'Fetching definitions... Please wait.';
            flashcards = [];

            try {
                for (const word of words) {
                    try {
                        const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                        if (response.ok) {
                            const data = await response.json();
                            const definition = data[0].meanings[0].definitions[0].definition;
                            flashcards.push({ word: word, definition: definition });
                        } else {
                            flashcards.push({ word: word, definition: "Definition not found." });
                        }
                    } catch (err) {
                        flashcards.push({ word: word, definition: "Error fetching definition." });
                    }
                }
                
                if (flashcards.length > 0) {
                    startReviewMode();
                } else {
                    throw new Error('Could not fetch any definitions.');
                }

            } catch (error) {
                console.error(error);
                statusDiv.textContent = 'Error: Could not generate data.';
                generateBtn.disabled = false;
            }
        });

        // -----------------------
        // NAVIGATION LOGIC
        // -----------------------
        function hideAllViews() {
            setupArea.style.display = 'none';
            reviewArea.style.display = 'none';
            flashcardArea.style.display = 'none';
            quizArea.style.display = 'none';
        }

        // -----------------------
        // REVIEW & EDIT LOGIC
        // -----------------------
        const reviewList = document.getElementById('review-list');
        const addRowBtn = document.getElementById('add-row-btn');
        const startStudyBtn = document.getElementById('start-study-btn');
        const backToReviewBtn = document.getElementById('back-to-review-btn');

        function startReviewMode() {
            hideAllViews();
            reviewArea.style.display = 'flex';
            reviewList.innerHTML = ''; // Clear old list
            
            // Populate list
            flashcards.forEach(card => {
                createReviewRow(card.word, card.definition);
            });
        }

        function createReviewRow(wordText = '', defText = '') {
            const row = document.createElement('div');
            row.className = 'review-item';
            
            row.innerHTML = `
                <input type="text" class="rev-word" value="${wordText}" placeholder="Word">
                <input type="text" class="rev-def" value="${defText}" placeholder="Definition">
                <button class="del-btn">X</button>
            `;
            
            row.querySelector('.del-btn').addEventListener('click', () => {
                row.remove();
            });

            reviewList.appendChild(row);
        }

        addRowBtn.addEventListener('click', () => {
            createReviewRow('', '');
            // Scroll to bottom
            reviewList.scrollTop = reviewList.scrollHeight;
        });

        startStudyBtn.addEventListener('click', () => {
            // Re-build the flashcards array from the current inputs
            flashcards = [];
            const rows = document.querySelectorAll('.review-item');
            
            rows.forEach(row => {
                const w = row.querySelector('.rev-word').value.trim();
                const d = row.querySelector('.rev-def').value.trim();
                
                if (w && d) {
                    flashcards.push({ word: w, definition: d });
                }
            });

            if (flashcards.length === 0) {
                alert("Please have at least one valid word and definition before studying.");
                return;
            }

            startFlashcardMode();
        });

        backToReviewBtn.addEventListener('click', startReviewMode);

        // -----------------------
        // FLASHCARD LOGIC
        // -----------------------
        const cardElement = document.getElementById('flashcard');
        const cardFront = document.getElementById('card-front');
        const cardBack = document.getElementById('card-back');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const cardCounter = document.getElementById('card-counter');

        function startFlashcardMode() {
            hideAllViews();
            flashcardArea.style.display = 'flex';
            currentIndex = 0;
            updateCardUI();
        }

        function updateCardUI() {
            cardElement.classList.remove('is-flipped');
            setTimeout(() => {
                cardFront.textContent = flashcards[currentIndex].word;
                cardBack.textContent = flashcards[currentIndex].definition;
                cardCounter.textContent = `Card ${currentIndex + 1} of ${flashcards.length}`;
                
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex === flashcards.length - 1;
            }, 150);
        }

        cardElement.addEventListener('click', () => cardElement.classList.toggle('is-flipped'));

        nextBtn.addEventListener('click', () => {
            if (currentIndex < flashcards.length - 1) {
                currentIndex++;
                updateCardUI();
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateCardUI();
            }
        });

        // -----------------------
        // QUIZ LOGIC
        // -----------------------
        const quizWordEl = document.getElementById('quiz-word');
        const quizOptionsContainer = document.getElementById('quiz-options');
        const quizCounterEl = document.getElementById('quiz-counter');
        const quizGameplay = document.getElementById('quiz-gameplay');
        const quizResults = document.getElementById('quiz-results');
        const finalScoreEl = document.getElementById('final-score');

        document.getElementById('go-to-quiz-btn').addEventListener('click', () => {
            if (flashcards.length < 2) {
                alert("You need at least 2 words to play the multiple-choice quiz!");
                return;
            }
            startQuizMode();
        });

        document.getElementById('restart-quiz-btn').addEventListener('click', startQuizMode);
        document.getElementById('back-to-flashcards-btn').addEventListener('click', startFlashcardMode);

        function startQuizMode() {
            hideAllViews();
            quizArea.style.display = 'flex';
            quizGameplay.style.display = 'block';
            quizResults.style.display = 'none';
            
            quizQuestions = [...flashcards].sort(() => Math.random() - 0.5);
            currentQuizIndex = 0;
            score = 0;
            
            loadQuizQuestion();
        }

        function loadQuizQuestion() {
            const currentItem = quizQuestions[currentQuizIndex];
            quizCounterEl.textContent = `Question ${currentQuizIndex + 1} of ${quizQuestions.length}`;
            quizWordEl.textContent = currentItem.word;
            
            quizOptionsContainer.innerHTML = '';

            let options = [currentItem.definition];
            
            let otherCards = flashcards.filter(c => c.word !== currentItem.word);
            otherCards.sort(() => Math.random() - 0.5); 
            
            for(let i = 0; i < Math.min(3, otherCards.length); i++) {
                options.push(otherCards[i].definition);
            }

            options.sort(() => Math.random() - 0.5);

            options.forEach(optText => {
                const btn = document.createElement('button');
                btn.classList.add('quiz-btn');
                btn.textContent = optText;
                
                btn.addEventListener('click', () => handleQuizAnswer(btn, optText, currentItem.definition));
                quizOptionsContainer.appendChild(btn);
            });
        }

        function handleQuizAnswer(btnElement, selectedDef, correctDef) {
            const allBtns = quizOptionsContainer.querySelectorAll('.quiz-btn');
            allBtns.forEach(b => b.disabled = true);

            if (selectedDef === correctDef) {
                btnElement.classList.add('correct');
                score++;
            } else {
                btnElement.classList.add('wrong');
                allBtns.forEach(b => {
                    if (b.textContent === correctDef) {
                        b.classList.add('correct');
                    }
                });
            }

            setTimeout(() => {
                currentQuizIndex++;
                if (currentQuizIndex < quizQuestions.length) {
                    loadQuizQuestion();
                } else {
                    showQuizResults();
                }
            }, 1500);
        }

        function showQuizResults() {
            quizGameplay.style.display = 'none';
            quizResults.style.display = 'block';
            finalScoreEl.textContent = `${score} / ${quizQuestions.length}`;
        }

        // -----------------------
        // GLOBAL RESET
        // -----------------------
        document.querySelectorAll('.reset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                hideAllViews();
                setupArea.style.display = 'block';
                statusDiv.textContent = '';
                generateBtn.disabled = false;
                document.getElementById('word-list').value = '';
                flashcards = [];
            });
        });
    </script>
</body>
</html>
