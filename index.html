<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Study App</title>
<style>
  :root { --p: #4F46E5; --bg: #F3F4F6; --txt: #1F2937; --cbg: #FFF; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--txt); display: flex; flex-direction: column; align-items: center; padding: 2rem; margin: 0; min-height: 100vh; }
  .box { width: 100%; max-width: 600px; background: var(--cbg); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px #0002; box-sizing: border-box; }
  .view { display: none; flex-direction: column; gap: 1rem; text-align: center; }
  .active { display: flex; }
  input, textarea { width: 100%; padding: .75rem; border: 1px solid #D1D5DB; border-radius: 6px; font: inherit; box-sizing: border-box; }
  button { background: var(--p); color: #FFF; border: none; padding: 1rem; border-radius: 6px; font-size: 1.15rem; font-weight: 600; cursor: pointer; transition: .2s; width: 100%; }
  button:hover { filter: brightness(1.1); }
  button:disabled { background: #9CA3AF; cursor: not-allowed; }
  .flex { display: flex; gap: 10px; }
  .green { background: #10B981 !important; } .red { background: #EF4444 !important; } .gray { background: #6B7280 !important; }
  h1, h2, h3 { margin: 0; }
  
  /* Cards */
  .scene { height: 250px; perspective: 600px; width: 100%; margin: 10px 0; }
  .card { width: 100%; height: 100%; position: relative; transition: transform .6s; transform-style: preserve-3d; cursor: pointer; }
  .card.flip { transform: rotateX(180deg); }
  .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 2rem; box-sizing: border-box; border-radius: 12px; box-shadow: 0 4px 6px #0002; font-size: 1.5rem; overflow-y: auto; background: var(--cbg); border: 2px solid var(--p); font-weight: bold; }
  .back { background: var(--p); color: #FFF; transform: rotateX(180deg); font-weight: normal; font-size: 1.3rem; }
  
  /* Quiz & Review */
  .opt { background: #E5E7EB; color: var(--txt); text-align: left; border: 2px solid transparent; }
  .opt:hover:not(:disabled) { background: #D1D5DB; }
  .opt.c { background: #10B981 !important; color: #FFF; border-color: #059669; } 
  .opt.w { background: #EF4444 !important; color: #FFF; border-color: #B91C1C; }
  .rev-row { display: flex; gap: 10px; }
  .del-btn { width: auto; padding: .75rem 1rem; background: #EF4444; }
</style>
</head>
<body>

  <div id="v-setup" class="box view active">
    <h1>Study App</h1>
    <textarea id="words" placeholder="Words to learn (comma or newline separated)" rows="4"></textarea>
    <button id="btn-fetch">Fetch Definitions</button>
    <button id="btn-resume" class="green" style="display:none">Resume Saved Deck</button>
    <div id="msg" style="font-weight:600; color:#4B5563"></div>
  </div>

  <div id="v-rev" class="box view">
    <h1>Review & Edit</h1>
    <div id="rev-list" style="max-height:350px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:2px"></div>
    <button id="btn-add" class="gray">Add Blank Row</button>
    <button id="btn-save" class="green">Save & Start Studying</button>
    <button class="btn-rst red">Start Over</button>
  </div>

  <div id="v-card" class="box view">
    <h1>Flashcards</h1><h3 id="c-count" style="color:#6B7280"></h3>
    <div class="scene"><div id="card" class="card">
      <div id="c-front" class="face"></div><div id="c-back" class="face back"></div>
    </div></div>
    <div class="flex"><button id="btn-p">Previous</button><button id="btn-n">Next</button></div>
    <button id="btn-q" class="green">Test Me (Quiz Mode)</button>
    <div class="flex"><button class="btn-rev gray">Edit Cards</button><button class="btn-rst red">Start Over</button></div>
  </div>

  <div id="v-quiz" class="box view">
    <h1>Quiz Time</h1><h3 id="q-count" style="color:#6B7280"></h3>
    <h2 id="q-word" style="color:var(--p); font-size:2.2rem; margin:1rem 0"></h2>
    <div id="q-opts" style="display:flex; flex-direction:column; gap:10px;"></div>
    <div id="q-res" style="display:none; margin: 1rem 0;">
      <h2 id="q-score" style="font-size:2.5rem"></h2><p>Great job!</p>
      <button id="btn-miss" class="red" style="display:none; margin-top:10px;">Study Missed Words</button>
      <button id="btn-rq" class="green" style="margin-top:10px;">Play Quiz Again</button>
    </div>
    <div class="flex" style="margin-top:10px"><button class="btn-c" style="background:var(--p)">Back to Flashcards</button><button class="btn-rst red">Start Over</button></div>
  </div>

<script>
  const $ = s => document.querySelector(s), $$ = s => document.querySelectorAll(s);
  let deck = [], quiz = [], qI = 0, cI = 0, score = 0, missed = [];

  const view = id => $$('.view').forEach(v => v.classList.toggle('active', v.id === id));
  const save = () => localStorage.setItem('myDeck', JSON.stringify(deck));
  
  // Init & Setup
  if(localStorage.myDeck && JSON.parse(localStorage.myDeck).length) { deck = JSON.parse(localStorage.myDeck); $('#btn-resume').style.display = 'block'; }
  $('#btn-resume').onclick = () => showCard();

const API_KEY = 'PASTE_YOUR_KEY_HERE'; // <--- Put your free Merriam-Webster key inside these quotes

  $('#btn-fetch').onclick = async () => {
    let ws = [...new Set($('#words').value.split(/,|\n/).map(w => w.trim()).filter(w => w))];
    if(!ws.length) return alert('Enter words');
    $('#btn-fetch').disabled = true; $('#msg').innerText = 'Fetching...'; deck = [];
    
    for(let w of ws) {
      try { 
        let r = await fetch(`https://www.dictionaryapi.com/api/v3/references/collegiate/json/${w}?key=${API_KEY}`);
        let d = await r.json();
        
        // MW returns an object with "shortdef" if found. If misspelled, it returns plain text suggestions.
        let def = (d.length && d[0].shortdef) ? d[0].shortdef[0] : 'Not found';
        deck.push({ w, d: def });
      } catch { 
        deck.push({ w, d: 'Error' }); 
      }
    }
    $('#btn-fetch').disabled = false; $('#msg').innerText = ''; showRev();
  };

  // Review
  const showRev = () => { view('v-rev'); renderRev(); };
  const renderRev = () => $('#rev-list').innerHTML = deck.map((c,i) => `<div class="rev-row"><input class="w" value="${c.w}"><input class="d" value="${c.d}"><button class="del-btn" onclick="deck.splice(${i},1);renderRev()">X</button></div>`).join('');
  $('#btn-add').onclick = () => { deck.push({w:'',d:''}); renderRev(); $('#rev-list').scrollTop = 9999; };
  $('#btn-save').onclick = () => {
    deck = [...$$('.rev-row')].map(r => ({ w: r.querySelector('.w').value.trim(), d: r.querySelector('.d').value.trim() })).filter(c => c.w && c.d);
    if(!deck.length) return alert('Need 1 valid word');
    save(); showCard();
  };

  // Card
  const showCard = () => { view('v-card'); cI = 0; updateCard(); };
  const updateCard = () => {
    $('#card').classList.remove('flip');
    setTimeout(() => {
      $('#c-front').innerText = deck[cI].w; $('#c-back').innerText = deck[cI].d;
      $('#c-count').innerText = `Card ${cI+1} of ${deck.length}`;
      $('#btn-p').disabled = cI === 0; $('#btn-n').disabled = cI === deck.length - 1;
    }, 150);
  };
  $('#card').onclick = () => $('#card').classList.toggle('flip');
  $('#btn-p').onclick = () => { if(cI > 0) { cI--; updateCard(); } };
  $('#btn-n').onclick = () => { if(cI < deck.length-1) { cI++; updateCard(); } };

  // Quiz
  const showQuiz = () => {
    if(deck.length < 2) return alert('Need 2+ words for quiz');
    view('v-quiz'); $('#q-opts').style.display = 'flex'; $('#q-res').style.display = 'none';
    quiz = [...deck].sort(() => Math.random() - .5); qI = score = 0; missed = []; loadQ();
  };
  const loadQ = () => {
    let q = quiz[qI], opts = [q.d, ...deck.filter(c => c.w !== q.w).sort(() => Math.random() - .5).slice(0,3).map(c => c.d)].sort(() => Math.random() - .5);
    $('#q-count').innerText = `Question ${qI+1} of ${quiz.length}`; $('#q-word').innerText = q.w;
    $('#q-opts').innerHTML = '';
    opts.forEach(o => {
      let b = document.createElement('button'); b.className = 'opt'; b.innerText = o;
      b.onclick = () => {
        $$('.opt').forEach(x => { x.disabled = true; if(x.innerText === q.d) x.classList.add('c'); });
        if(o === q.d) score++; else { b.classList.add('w'); if(!missed.some(m => m.w === q.w)) missed.push(q); }
        setTimeout(() => {
          if(++qI < quiz.length) loadQ();
          else { $('#q-opts').style.display = 'none'; $('#q-res').style.display = 'block'; $('#q-score').innerText = `${score} / ${quiz.length}`; $('#btn-miss').style.display = missed.length ? 'block' : 'none'; }
        }, 1500);
      }; $('#q-opts').appendChild(b);
    });
  };

  // Global Controls
  $$('.btn-rst').forEach(b => b.onclick = () => { view('v-setup'); $('#words').value = ''; deck = []; save(); $('#btn-resume').style.display = 'none'; });
  $$('.btn-rev').forEach(b => b.onclick = showRev);
  $$('.btn-c').forEach(b => b.onclick = showCard);
  $('#btn-q').onclick = $('#btn-rq').onclick = showQuiz;
  $('#btn-miss').onclick = () => { deck = [...missed]; save(); showCard(); };
</script>
</body>
</html>
